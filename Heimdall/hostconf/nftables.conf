#!/usr/sbin/nft -f
#
# Heimdall — nftables ruleset.
# Installed to /etc/nftables.conf by setup.sh; loaded by nftables.service on boot.
#
# Posture:
#   - Default-deny inbound (input policy drop)
#   - No forwarding (Heimdall is a leaf, not a router — forward chain empty + dropped)
#   - Egress unrestricted
#
# Allowlist sources:
#   LAN  = 192.168.10.0/24
#   WAN  = anywhere (port-forwarded from UCG)
#
# Per the approved plan: port 80 is open on LAN only (for the /ca.crt file_server distributing
# the Caddy internal-CA root). Port 80 is NOT forwarded from WAN — internal-CA default obviates
# HTTP-01 ACME (iter-1 known concern #4).

flush ruleset

table inet heimdall_fw {

    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback — always accept
        iif "lo" accept

        # Stateful connections — accept established/related, drop invalid
        ct state established,related accept
        ct state invalid drop

        # ICMP / ICMPv6 — accept echo + neighbor discovery (rate-limit unrestricted)
        ip protocol icmp limit rate 10/second accept
        ip6 nexthdr icmpv6 limit rate 10/second accept

        # SSH — LAN only (operator access)
        ip saddr 192.168.10.0/24 tcp dport 22 accept

        # DNS — LAN only (Technitium listens here under network_mode: host)
        ip saddr 192.168.10.0/24 udp dport 53 accept
        ip saddr 192.168.10.0/24 tcp dport 53 accept

        # Technitium web UI — LAN only
        ip saddr 192.168.10.0/24 tcp dport 5380 accept

        # DoT — LAN only (opt-in; off in Technitium config by default in v1)
        ip saddr 192.168.10.0/24 tcp dport 853 accept

        # HTTP — LAN only (Caddy /ca.crt file_server; NOT WAN-forwarded — iter-1 #4)
        ip saddr 192.168.10.0/24 tcp dport 80 accept

        # HTTPS — unrestricted (Caddy; WAN-forwarded from UCG)
        tcp dport 443 accept
        udp dport 443 accept     # HTTP/3 / QUIC

        # Game ports — unrestricted (Caddy L4; WAN-forwarded from UCG as needed)
        tcp dport 25565 accept   # Minecraft TCP
        udp dport 25565 accept   # Minecraft Bedrock / Geyser

        # Komodo Periphery — localhost only (Core talks to Periphery via 127.0.0.1:8120)
        # This rule is defense-in-depth; periphery.config.toml's allowed_ips should also restrict.
        ip saddr 127.0.0.0/8 tcp dport 8120 accept

        # Komodo Core UI — LAN only (Caddy reverse_proxies to 127.0.0.1:9120 for komodo.lab,
        # but allow direct LAN access for break-glass)
        ip saddr 192.168.10.0/24 tcp dport 9120 accept

        # Everything else: drop (policy)
    }

    chain forward {
        type filter hook forward priority filter; policy accept;
        # Docker bridge networking (container-to-container traffic) transits the
        # forward hook. A `policy drop` here breaks Docker's bridge networks
        # (e.g., komodo-core ↔ mongo). The L3 router posture is enforced
        # elsewhere by the kernel sysctl `net.ipv4.ip_forward` (off by default),
        # so even with `policy accept` here, Heimdall does NOT forward packets
        # between L3 networks. Bridge traffic is L2 and is what we want to
        # allow.
        #
        # If/when inter-fabric L3 routing is intentionally enabled:
        # (a) flip net.ipv4.ip_forward=1 via /etc/sysctl.d/10-heimdall-router.conf
        # (b) tighten this chain to `policy drop` PLUS explicit allow rules for
        #     each cross-fabric flow PLUS Docker bridge interfaces still need
        #     `iif "docker*" accept` and `iif "br-*" accept`.
    }

    chain output {
        type filter hook output priority filter; policy accept;
        # Egress unrestricted in v1.
    }
}
