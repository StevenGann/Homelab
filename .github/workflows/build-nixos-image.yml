name: Build Hyperion NixOS image

# Builds the live SD-card installer for Hyperion Pi 5 workers and publishes
# it as a GitHub Release asset (on main only). The image is flashed to a
# microSD and inserted at assembly; the node then becomes SSH-reachable so
# the operator workstation installs NixOS onto its NVMe via nixos-anywhere
# (./flash-node.sh). The per-host worker closures are NOT built here — they
# are built on the target node at flash time (--build-on-remote).
#
# Wall-clock (estimated, validated in Phase 1):
#   5-10 min cached (Cachix hits cover the rpi5 kernel + ~99% of closure)
#   20-30 min cold (kernel rebuilds locally on ubuntu-24.04-arm)
#
# Phase 0 of the pipeline already cut the Packer workflows to native
# ARM runners. This workflow uses the same runner label.

on:
  push:
    branches: [main]
    paths:
      - 'Hyperion/nixos/**'
      - '.github/workflows/build-nixos-image.yml'
  # Manual runs (incl. from feature branches) build the image but do NOT
  # publish a Release — see the `if:` guard on the publish step.
  workflow_dispatch:

concurrency:
  group: build-images
  cancel-in-progress: false

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (Determinate flake-enabled installer)
        uses: DeterminateSystems/nix-installer-action@v18

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Configure substituters (nixos-raspberrypi Cachix)
        run: |
          mkdir -p ~/.config/nix
          cat >> ~/.config/nix/nix.conf <<'EOF'
          substituters = https://cache.nixos.org https://nixos-raspberrypi.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI=
          EOF

      - name: Generate version tag
        run: echo "VERSION=$(date -u +%Y%m%d-${GITHUB_SHA::8})" >> "$GITHUB_ENV"

      # Cheap module-evaluation check for a worker closure. Catches option
      # conflicts / missing attrs in the per-host + shared modules (which the
      # installer image does NOT import) without the ~20 min full realize.
      - name: Eval-check worker closure (hyperion-alpha)
        working-directory: Hyperion/nixos
        run: |
          set -euo pipefail
          nix eval --raw \
            .#nixosConfigurations.hyperion-alpha.config.system.build.toplevel.drvPath

      - name: Build live SD installer image
        working-directory: Hyperion/nixos
        run: |
          set -euo pipefail
          nix build .#installerSdImage --print-build-logs

      - name: Compress
        working-directory: Hyperion/nixos
        run: |
          set -euo pipefail
          IMG=$(readlink -f result/sd-image/*.img)
          test -f "$IMG" || { echo "Image not found at result/sd-image/*.img"; exit 1; }
          OUT="hyperion-sd-installer-${{ env.VERSION }}.img.zst"
          zstd -19 -T0 "$IMG" -o "../../$OUT"
          cd ../..
          echo "IMG_FILE=$OUT" >> "$GITHUB_ENV"
          echo "IMG_SHA256=$(sha256sum "$OUT" | awk '{print $1}')" >> "$GITHUB_ENV"

      # Publish only on push to main. Manual/feature-branch runs stop after
      # the build above, proving the image compiles without minting releases.
      - name: Publish to GitHub Releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release-notes.md <<NOTES
          SHA256: ${IMG_SHA256}

          Live SD-card installer for Hyperion Pi 5 workers.

          One-time per node, at hardware assembly:

          \`\`\`
          curl -OL https://192.168.10.4:50011/sd-installer/${IMG_FILE}
          zstd -d ${IMG_FILE} | sudo dd of=/dev/sdX bs=4M conv=fsync status=progress
          sync
          \`\`\`

          Insert the SD into the Pi, set EEPROM BOOT_ORDER=0xf16 (NVMe -> SD),
          power on, note the DHCP IP, then from the workstation:

          \`\`\`
          cd Hyperion && ./flash-node.sh <ip> hyperion-<name>
          \`\`\`

          See Hyperion/docs/runbooks/remote-flash-a-node.md.
          NOTES
          gh release create "sd-installer-${VERSION}" \
            --title "Hyperion NixOS SD installer (${VERSION})" \
            --notes-file /tmp/release-notes.md \
            "${IMG_FILE}"
