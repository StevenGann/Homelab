apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: media
  labels: { app: flaresolverr }
spec:
  replicas: 1
  strategy: { type: Recreate }          # stateless, but keep a single pod in the zone
  selector:
    matchLabels: { app: flaresolverr }
  template:
    metadata:
      labels: { app: flaresolverr }
    spec:
      nodeSelector: { topology.kubernetes.io/zone: hyperion }
      containers:
        - name: flaresolverr
          # ARM64: upstream ghcr.io/flaresolverr/flaresolverr ships NO arm64 image
          # (amd64-only). 21hsmw 'nodriver' is the maintained community fork whose
          # multi-arch index DOES carry a linux/arm64 child manifest (verified via
          # registry-1.docker.io). The index digest below resolves arm64 on Pi 5.
          image: 21hsmw/flaresolverr:nodriver@sha256:dca8cda5852b04e6142752fc044c9845eb536353ea6f8b7bb58b4ff9419538fa
          env:
            - { name: LOG_LEVEL, value: "info" }
            - { name: TZ,        value: "America/Los_Angeles" }
          ports:
            - { name: http, containerPort: 8191 }
          startupProbe:                  # headless Chromium cold-start is slow on arm64
            httpGet: { path: /, port: 8191 }
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 8191 }
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /, port: 8191 }
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }   # a Chromium solve spikes both
