name: Build and publish ci-deploy image

on:
  push:
    branches: [main]
    paths:
      - 'Heimdall/hyperion/ci-deploy/**'
  workflow_dispatch:

concurrency:
  group: build-ci-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ci-deploy image
        uses: docker/build-push-action@v7
        with:
          context: Heimdall/hyperion/ci-deploy
          push: true
          # :latest stays for operator visibility; :sha-<commit> is the
          # immutable rollback target Compose should pin to (Tier 3.3 of
          # the dev-hyperion-flashing-to-heimdall pipeline FINAL.md). The
          # run_number tag was rejected at review (per-workflow counter,
          # misleading across images).
          tags: |
            ghcr.io/stevengann/homelab-ci-deploy:latest
            ghcr.io/stevengann/homelab-ci-deploy:sha-${{ github.sha }}
