apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.72
spec:
  type: LoadBalancer
  selector: { app: nextcloud }
  ports:
    - { name: http,  port: 80,  targetPort: 80,  protocol: TCP }
    - { name: https, port: 443, targetPort: 443, protocol: TCP }
