apiVersion: v1
kind: Service
metadata:
  name: jellystat
  namespace: jellystat
  annotations: { metallb.io/loadBalancerIPs: 192.168.10.76 }
spec:
  type: LoadBalancer
  selector: { app: jellystat }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
    - { name: web,  port: 80,   targetPort: 3000 }
