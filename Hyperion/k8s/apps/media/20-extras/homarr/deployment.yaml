apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: media
  labels: { app: homarr }
spec:
  replicas: 1
  strategy: { type: Recreate }          # RWO local-path appdata pins to a node
  selector:
    matchLabels: { app: homarr }
  template:
    metadata:
      labels: { app: homarr }
    spec:
      nodeSelector: { topology.kubernetes.io/zone: hyperion }
      containers:
        - name: homarr
          image: ghcr.io/homarr-labs/homarr:v1.60.0@sha256:9ec1c487ca908471d83ddb7d56c9135f0034bd584295d56cdb4ee9830d747546
          env:
            - { name: TZ, value: "America/Los_Angeles" }
            # ─── SSO via Authentik (OIDC) ─────────────────────────────────────
            # CLIENT_ID/SECRET arrive through the homarr-secret (envFrom below),
            # mirrored from Authentik's blueprint (AUTHENTIK_HOMARR_CLIENT_*).
            # `credentials` is kept first as an admin fallback so an OIDC
            # misconfig can never lock you out of Homarr.
            # GATED: AUTH_PROVIDERS is "credentials" only until Authentik + the
            # Cloudflare tunnel are live. Flux applies this immediately on push, so
            # leaving oidc enabled now would point Homarr at an issuer that doesn't
            # resolve yet. When Authentik is up and auth.stevengann.com resolves,
            # flip this to "credentials,oidc" (the AUTH_OIDC_* vars below are already
            # set and just become active). See docs/runbooks/sso-bring-up.md §5.
            #
            # Issuer is the PUBLIC Authentik hostname (Cloudflare Tunnel). Its edge
            # cert is publicly trusted, so Homarr validates it with no CA mount —
            # and public users redirect through the same hostname they reach Homarr
            # on. Resolves internally via hairpin (Technitium → Cloudflare → tunnel).
            - { name: AUTH_PROVIDERS,             value: "credentials" }       # → "credentials,oidc" once Authentik is up
            - { name: AUTH_OIDC_CLIENT_NAME,      value: "Authentik" }
            - { name: AUTH_OIDC_ISSUER,           value: "https://auth.stevengann.com/application/o/homarr/" }
            - { name: AUTH_OIDC_SCOPE_OVERWRITE,  value: "openid email profile" }
            - { name: AUTH_OIDC_GROUPS_ATTRIBUTE, value: "groups" }
          envFrom:
            - secretRef: { name: homarr-secret }   # SECRET_ENCRYPTION_KEY + AUTH_OIDC_CLIENT_ID/SECRET (SOPS-seeded)
          ports:
            - { name: http, containerPort: 7575 }
          volumeMounts:
            - { name: appdata, mountPath: /appdata }
          startupProbe:                  # /api/health/ready is 200 once the HTTP server serves; generous for arm64 first boot
            httpGet: { path: /api/health/ready, port: 7575 }
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:                # /api/health/live also checks the embedded DB
            httpGet: { path: /api/health/live, port: 7575 }
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /api/health/live, port: 7575 }
            periodSeconds: 30
          resources:
            requests: { cpu: "200m", memory: "384Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
      volumes:
        - name: appdata
          persistentVolumeClaim: { claimName: homarr-appdata }
