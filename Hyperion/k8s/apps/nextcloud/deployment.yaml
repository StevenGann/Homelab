apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
  labels: { app: nextcloud }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: nextcloud }
  template:
    metadata:
      labels: { app: nextcloud }
    spec:
      nodeSelector: { topology.kubernetes.io/zone: hyperion }
      containers:
        - name: nextcloud
          image: lscr.io/linuxserver/nextcloud:latest
          imagePullPolicy: Always
          env:
            - { name: PUID, value: "568" }
            - { name: PGID, value: "568" }
            - { name: TZ,   value: "America/Los_Angeles" }
          ports:
            - { name: http,  containerPort: 80,  protocol: TCP }
            - { name: https, containerPort: 443, protocol: TCP }
          startupProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: "/", port: 80, scheme: HTTP }
            periodSeconds: 15
            timeoutSeconds: 5      # PHP app — 1s is too aggressive
            failureThreshold: 3
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: data,   mountPath: /data }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      volumes:
        - name: config
          nfs: { server: "192.168.10.247", path: "/mnt/Media-Storage/NextCloud/config" }
        - name: data
          nfs: { server: "192.168.10.247", path: "/mnt/Media-Storage/NextCloud/data" }
