# youtarr-config + youtarr-db — ROLLED BACK to node-local (local-path) on 2026-06-14.
# The 2026-06-05 NFS flip was reverted because the Akasha export dirs
# /mnt/Media-Storage/Application-Storage/media/youtarr-{config,db} were never created,
# so the NFS mounts failed ("No such file or directory") and the app could not start.
# Bound by volumeName to the original dynamically-provisioned PVs (data preserved;
# PV reclaim policy is Retain). Re-do the NFS migration deliberately later:
#   1) create the dirs on Akasha, 2) copy data in, 3) flip these back to the NFS PVs.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: youtarr-config
  namespace: media
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  volumeName: pvc-05f47581-d7f7-4019-b6cd-a56c42256aa2
  resources: { requests: { storage: 2Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: youtarr-db
  namespace: media
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  volumeName: pvc-e890bb6d-f640-424b-bc45-d61b87660117
  resources: { requests: { storage: 2Gi } }
