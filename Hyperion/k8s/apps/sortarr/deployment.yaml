apiVersion: apps/v1
kind: Deployment
metadata:
  name: sortarr
  namespace: sortarr
  labels: { app: sortarr, homelab.lab/auto-refresh: "true" }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: sortarr }
  template:
    metadata:
      labels: { app: sortarr }
    spec:
      nodeSelector: { topology.kubernetes.io/zone: hyperion }
      containers:
        - name: sortarr
          image: ghcr.io/jaredharper1/sortarr:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 8787, protocol: TCP }
          startupProbe:
            tcpSocket: { port: 8787 }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket: { port: 8787 }   # App returns 401 on / (needs auth)
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - { name: config, mountPath: /app/config }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: sortarr-config }
