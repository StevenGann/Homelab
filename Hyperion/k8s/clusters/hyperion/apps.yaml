# Application workloads. Each app gets a Flux Kustomization here.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/headlamp
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: metallb-config     # needs the MetalLB pool for its LoadBalancer IP
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: uptime-kuma
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/uptime-kuma
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: metallb-config
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/hermes
  prune: true
  wait: true
  timeout: 10m                 # multi-GB image pull + s6 first-boot
  dependsOn:
    - name: metallb-config     # needs the MetalLB pool for the dashboard LB IP
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:                  # SOPS-encrypted Secrets (DeepSeek key, dashboard htpasswd)
    provider: sops
    secretRef:
      name: sops-age
---
# ── *arr media stack (plan: docs/design/arr-stack-plan.md) ──────────────────
# Two tiers wired here; 20-extras is deliberately NOT pointed at yet (lean-core
# gate — added in a follow-up PR after a ~1-week core soak).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-storage
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/media/00-storage
  prune: true
  wait: true                   # the nfs-mount-probe Job must complete (storage gate)
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-core
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/media/10-core
  prune: true
  wait: true
  timeout: 10m                 # first-boot SQLite migration on arm64
  dependsOn:
    - name: media-storage      # don't deploy *arr onto unproven NFS
    - name: metallb-config     # needs the MetalLB pool for the LoadBalancer IPs
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:                  # SOPS-encrypted *arr API keys
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-extras
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/media/20-extras
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: media-storage      # NFS PVCs (comics/youtube/tv/movies)
    - name: metallb-config     # LoadBalancer IPs
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:                  # homarr/seerr/youtarr SOPS secrets
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: beszel, namespace: flux-system }
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/beszel
  prune: true
  wait: true
  timeout: 5m
  dependsOn: [ { name: metallb-config } ]
  sourceRef: { kind: GitRepository, name: flux-system }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: speedtest-tracker, namespace: flux-system }
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/speedtest-tracker
  prune: true
  wait: true
  timeout: 5m
  dependsOn: [ { name: metallb-config } ]
  sourceRef: { kind: GitRepository, name: flux-system }
  decryption: { provider: sops, secretRef: { name: sops-age } }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: pterodactyl, namespace: flux-system }
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/pterodactyl
  prune: true
  wait: true
  timeout: 10m
  dependsOn: [ { name: metallb-config } ]
  sourceRef: { kind: GitRepository, name: flux-system }
  decryption: { provider: sops, secretRef: { name: sops-age } }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: caldera, namespace: flux-system }
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/caldera
  prune: true
  wait: true
  timeout: 10m                 # arm64 first boot + initial vault clone
  dependsOn: [ { name: metallb-config } ]
  sourceRef: { kind: GitRepository, name: flux-system }
  decryption: { provider: sops, secretRef: { name: sops-age } }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: n8n, namespace: flux-system }
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/n8n
  prune: true
  wait: true
  timeout: 5m
  dependsOn: [ { name: metallb-config } ]
  sourceRef: { kind: GitRepository, name: flux-system }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: nextcloud, namespace: flux-system }
spec:
  interval: 10m
  path: ./Hyperion/k8s/apps/nextcloud
  prune: true
  wait: true
  timeout: 10m
  dependsOn: [ { name: metallb-config } ]
  sourceRef: { kind: GitRepository, name: flux-system }
