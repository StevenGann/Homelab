# Homarr — OIDC (OAuth2) provider + application, restricted to friends-family.
#
# client_id/secret come from the shipped .env via !Env and are mirrored into the
# Homarr k8s Secret (Hyperion/k8s/apps/media/20-extras/homarr/secret.sops.yaml)
# so both sides share one credential. Homarr env wiring lives in that app's
# deployment.yaml.
#
# Issuer Homarr must use: https://auth.lab/application/o/homarr/
# Callback Homarr sends:  http(s)://homarr.lab[:7575]/api/auth/callback/oidc
version: 1
metadata:
  name: homelab-provider-homarr
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-homarr
    identifiers: { name: Homarr }
    attrs:
      client_type: confidential
      client_id: !Env [AUTHENTIK_HOMARR_CLIENT_ID]
      client_secret: !Env [AUTHENTIK_HOMARR_CLIENT_SECRET]
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      # Tolerant of http/https and the optional :7575 NodePort-style access.
      redirect_uris:
        - matching_mode: regex
          url: "https?://homarr\\.lab(:7575)?/api/auth/callback/oidc"
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]

  - model: authentik_core.application
    identifiers: { slug: homarr }
    attrs:
      name: Homarr
      provider: !KeyOf provider-homarr
      meta_launch_url: http://homarr.lab
      meta_description: Homelab dashboard
      group: Media
      policy_engine_mode: any

  # Restrict the app to the friends-family group.
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, homarr]]
      group: !Find [authentik_core.group, [name, friends-family]]
      order: 0
    attrs:
      enabled: true
