apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: media
spec:
  # Cluster-internal only — Prowlarr reaches it at http://flaresolverr.media:8191/
  # No MetalLB IP: nothing outside the cluster talks to FlareSolverr.
  type: ClusterIP
  selector: { app: flaresolverr }
  ports:
    - { name: http, port: 8191, targetPort: 8191 }
