# Heimdall — systemd-resolved drop-in.
#
# Installed to /etc/systemd/resolved.conf.d/no-stub.conf by setup.sh.
# Frees TCP/UDP port 53 on the host so Technitium can bind it under network_mode: host.
# After this drop-in is loaded:
#   1. systemd-resolved no longer binds 127.0.0.53:53 (DNSStubListener=no)
#   2. /etc/resolv.conf is symlinked to /run/systemd/resolve/resolv.conf (NOT stub-resolv.conf)
#      → host queries hit the upstream resolver directly (UCG bootstrap, AdGuard-equivalent after Phase 2)
#
# Ordering matters (per the approved plan's known concern #5): write this file → restart systemd-resolved
# → THEN swap the /etc/resolv.conf symlink. setup.sh enforces that order.

[Resolve]
DNSStubListener=no
DNS=192.168.10.1
FallbackDNS=1.1.1.1 9.9.9.9
