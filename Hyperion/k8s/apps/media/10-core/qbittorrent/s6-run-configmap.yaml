apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-s6-run
  namespace: media
data:
  run: |
    #!/usr/bin/with-contenv bash
    # Custom s6 run script for qBittorrent.
    # Fixes four issues with the image's default:
    #
    # 1. Adds --profile=/config/qBittorrent (without it, qBittorrent looks
    #    in $HOME/.config/ which doesn't exist → dies silently).
    #
    # 2. Clears STALE single-instance locks before launch. This was THE cause
    #    of the silent crash-loop (2026-06-05): on an unclean pod shutdown
    #    qBittorrent leaves `lockfile` + `ipc-socket` behind in the config PVC.
    #    On the next start qbittorrent-nox sees them, assumes another instance
    #    is already running, prints nothing, and exits 0 — so s6 keeps
    #    restarting it, the WebUI never binds :8085, and the readiness probe
    #    fails forever (pod stuck 1/2). The lock lives in the PVC, so it
    #    survives pod restarts and the loop is self-perpetuating. s6 supervises
    #    exactly one qbittorrent-nox, so there is never a legitimate concurrent
    #    instance here — removing the locks unconditionally is safe. qBittorrent
    #    uses BOTH the profile root and <profile>/qBittorrent/config as lock
    #    locations depending on version, so clear both.
    #
    # 3. --confirm-legal-notice so qBittorrent never blocks waiting on the
    #    interactive "Legal Notice" acknowledgement on a fresh/empty profile.
    #
    # 4. Pins the WebUI to IPv4 (WebUI\Address=0.0.0.0). With WebUI\Address unset
    #    or "*", qBittorrent 5.x binds the WebUI IPv6-only (:::8085); the kubelet
    #    tcpSocket readiness probe (to the pod's IPv4 IP) and the port-sync
    #    healthcheck (127.0.0.1) are then refused -> pod stuck 1/2 and port-sync
    #    pkill-loops it (root cause of the 2026-06-14 outage). Forcing an explicit
    #    IPv4 bind here makes every start deterministic, including on a fresh PVC.
    #
    # Readiness check: poll `nc -z` every 1s for up to 300 tries (~5 min window).
    # (The previous -w 15000 set a 15s GAP between polls — that delayed
    # readiness detection, it did not lengthen the window. -w is the inter-poll
    # delay, -n is the try count; -n 300 -w 1000 matches the lsio default.)

    s6-setuidgid abc rm -f /config/qBittorrent/lockfile \
          /config/qBittorrent/ipc-socket \
          /config/qBittorrent/qBittorrent/config/lockfile \
          /config/qBittorrent/qBittorrent/config/ipc-socket

    # Force the WebUI to bind IPv4 (see item 4 above). Idempotent: drop any
    # existing WebUI\Address line, then insert 0.0.0.0 ahead of WebUI\Port
    # (both live in [Preferences]). Runs as abc to preserve conf ownership.
    QBT_CONF=/config/qBittorrent/qBittorrent/config/qBittorrent.conf
    if [[ -f ${QBT_CONF} ]] && ! grep -q '^WebUI\\Address=0.0.0.0$' "${QBT_CONF}"; then
        s6-setuidgid abc sed -i '/^WebUI\\Address=/d' "${QBT_CONF}"
        s6-setuidgid abc sed -i '/^WebUI\\Port=/i WebUI\\Address=0.0.0.0' "${QBT_CONF}"
    fi

    WEBUI_ADDRESS=$(grep -Po "^WebUI\\Address=\K(.*)" /config/qBittorrent/qBittorrent/config/qBittorrent.conf 2>/dev/null)
    if [[ -z ${WEBUI_ADDRESS} ]] || [[ ${WEBUI_ADDRESS} == "*" ]]; then
        WEBUI_ADDRESS="localhost"
    fi

    # 5. Wait for gluetun's VPN interface (tun0) BEFORE launching qBittorrent.
    #    gluetun and qBittorrent share a network namespace, so tun0 is visible here.
    #    libtorrent only binds the interface (Session\Interface*=tun0, persisted in
    #    the config PVC) on a session that STARTS with tun0 already up. Waiting here
    #    means the first session binds the tunnel cleanly — which removes the need
    #    for port-sync.sh to pkill/restart qBittorrent ("restart for a clean tun0
    #    session"). That restart loop was the root cause of recurring readiness
    #    failures: any transient during boot made it kill qBittorrent forever.
    _t=0
    until ip -o -4 addr show tun0 2>/dev/null | grep -q 'inet '; do
        _t=$((_t + 1))
        if [[ ${_t} -ge 90 ]]; then echo "[s6-run] WARNING: tun0 still down after ~180s; launching anyway"; break; fi
        echo "[s6-run] waiting for tun0 (gluetun VPN) ..."
        sleep 2
    done

    exec \
        s6-notifyoncheck -d -n 300 -w 1000 -c "nc -z ${WEBUI_ADDRESS} ${WEBUI_PORT:-8080}" \
            s6-setuidgid abc /app/qbittorrent-nox --confirm-legal-notice --profile=/config/qBittorrent --webui-port="${WEBUI_PORT:-8080}" ${TORRENTING_PORT+--torrenting-port=${TORRENTING_PORT}}
