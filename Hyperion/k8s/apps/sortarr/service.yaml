apiVersion: v1
kind: Service
metadata:
  name: sortarr
  namespace: sortarr
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.77
spec:
  type: LoadBalancer
  selector: { app: sortarr }
  ports:
    - { name: http, port: 8787, targetPort: 8787 }
    - { name: web,  port: 80,   targetPort: 8787 }
