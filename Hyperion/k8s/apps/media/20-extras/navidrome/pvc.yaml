# navidrome-data — ROLLED BACK to node-local (local-path) on 2026-06-14.
# The 2026-06-05 NFS flip was reverted because the Akasha export dir
# /mnt/Media-Storage/Application-Storage/media/navidrome-data was never created,
# so the NFS mount failed ("No such file or directory") and the app could not start.
# Bound by volumeName to the original dynamically-provisioned PV (data preserved;
# PV reclaim policy is Retain). Re-do the NFS migration deliberately later:
#   1) create the dir on Akasha, 2) copy data in AS UID 568 (the app's runAsUser —
#      root_squash passes non-root UIDs through but squashes root→65534),
#   3) flip this back to the NFS PV.
# WARNING: root_squash chown trap (same failure mode as cleanuparr 2026-06-24):
#   if /config files were previously root-owned (now 65534), UID 568 cannot
#   chown them → "Operation not permitted" → CrashLoopBackOff.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data
  namespace: media
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  volumeName: pvc-1b8393c6-ac8b-44ed-a70b-974b7cc0d00e
  resources: { requests: { storage: 2Gi } }
