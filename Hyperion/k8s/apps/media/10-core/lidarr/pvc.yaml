# lidarr-config on Akasha NFS (Application-Storage), NOT node-local.
# 2026-06-05 storage migration (docs/storage-audit-2026-06-05.md): no Hyperion
# service keeps persistent data on a node's local NVMe. Lidarr SQLite. SQLite/embedded
# DBs work over NFSv4.1 'hard' mounts with locking. Static PV+PVC per the
# akasha-*-nfs convention in media/00-storage/. PVC name unchanged.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: akasha-app-media-lidarr-config
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  capacity: { storage: 2Gi }
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
  claimRef: { namespace: media, name: lidarr-config }
  mountOptions: [nfsvers=4.1, hard, noatime]
  nfs: { server: 192.168.10.247, path: /mnt/Media-Storage/Application-Storage/media/lidarr-config }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lidarr-config
  namespace: media
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: akasha-app-media-lidarr-config
  resources: { requests: { storage: 2Gi } }
