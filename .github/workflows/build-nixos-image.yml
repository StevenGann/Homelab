name: Build Hyperion NixOS image

# Builds the installer image for Hyperion Pi 5 workers and publishes it
# as a GitHub Release asset. The image is flashed to a blank NVMe via
# `dd` on the operator workstation; no nixos-anywhere, no SD-card boot.
#
# Wall-clock (estimated, validated in Phase 1):
#   5-10 min cached (Cachix hits cover the rpi5 kernel + ~99% of closure)
#   20-30 min cold (kernel rebuilds locally on ubuntu-24.04-arm)
#
# Phase 0 of the pipeline already cut the Packer workflows to native
# ARM runners. This workflow uses the same runner label.

on:
  push:
    branches: [main]
    paths:
      - 'Hyperion/nixos/**'
      - '.github/workflows/build-nixos-image.yml'
  workflow_dispatch:

concurrency:
  group: build-images
  cancel-in-progress: false

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (Determinate flake-enabled installer)
        uses: DeterminateSystems/nix-installer-action@v18

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Configure substituters (nixos-raspberrypi Cachix)
        run: |
          mkdir -p ~/.config/nix
          cat >> ~/.config/nix/nix.conf <<'EOF'
          substituters = https://cache.nixos.org https://nixos-raspberrypi.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI=
          EOF

      - name: Generate version tag
        run: echo "VERSION=$(date -u +%Y%m%d-${GITHUB_SHA::8})" >> "$GITHUB_ENV"

      - name: Build installer image
        working-directory: Hyperion/nixos
        run: |
          set -euo pipefail
          nix build .#installerImage --print-build-logs

      - name: Compress
        working-directory: Hyperion/nixos
        run: |
          set -euo pipefail
          IMG=$(readlink -f result/sd-image/*.img)
          test -f "$IMG" || { echo "Image not found at result/sd-image/*.img"; exit 1; }
          OUT="hyperion-nvme-${{ env.VERSION }}.img.zst"
          zstd -19 -T0 "$IMG" -o "../../$OUT"
          cd ../..
          echo "IMG_FILE=$OUT" >> "$GITHUB_ENV"
          echo "IMG_SHA256=$(sha256sum "$OUT" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release-notes.md <<NOTES
          SHA256: ${IMG_SHA256}

          Flash to a blank NVMe on the operator workstation:

          \`\`\`
          curl -OL https://192.168.10.4:50011/nvme/${IMG_FILE}
          zstd -d ${IMG_FILE} | sudo dd of=/dev/nvmeXn1 bs=4M conv=fsync status=progress
          sync
          \`\`\`

          Then move the NVMe into the target Pi, insert HYPERION-ID identity USB, power on.
          NOTES
          gh release create "nvme-${VERSION}" \
            --title "Hyperion NixOS NVMe image (${VERSION})" \
            --notes-file /tmp/release-notes.md \
            "${IMG_FILE}"
