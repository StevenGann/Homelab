# kapowarr-db — SQLite database on local-path (/mnt/node-storage).
# NOT on NFS — local ext4 avoids root_squash chown issues and
# SQLite latency flapping. PUID=0 workaround applied because
# the image's entrypoint chowns /app/temp_downloads (NFS downloads
# mount) recursively — that's 125GB+ over NFS and takes hours.
# When Longhorn is deployed post-control-plane-relocation, this
# should move to Longhorn for node-failure survivability.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kapowarr-db
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources: { requests: { storage: 1Gi } }
