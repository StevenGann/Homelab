apiVersion: v1
kind: Service
metadata:
  name: immich-redis
  namespace: media
  labels:
    app: immich
    component: redis
spec:
  type: ClusterIP
  selector:
    app: immich
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-redis
  namespace: media
  labels:
    app: immich
    component: redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
      component: redis
  template:
    metadata:
      labels:
        app: immich
        component: redis
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: hyperion
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
