# WARNING: STAGED — NOT DEPLOYED. The active seerr-config PVC is in
# 20-extras/seerr/pvc.yaml (local-path). This file is an orphaned proposal
# from the 2026-06-05 NFS migration wave. DO NOT ACTIVATE without understanding:
#
# 1. Seerr runs as UID 1000 (see 20-extras/seerr/deployment.yaml).
# 2. Application-Storage export is root_squash (root→65534) — NOT mapall 568.
# 3. If /config files were previously root-owned on NFS, UID 1000 cannot chown
#    files owned by 65534 → "Operation not permitted" → CrashLoopBackOff.
#    This is the exact failure mode that broke cleanuparr on 2026-06-24.
# 4. If migrating to NFS deliberately: create the dir on Akasha AS UID 1000,
#    populate data with matching ownership, and only then flip the PVC.
#
# Static PV+PVC follows the akasha-*-nfs convention in media/00-storage/.
# See ADR-0003 and the cleanuparr fix (2026-06-24).
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: akasha-app-media-seerr-config
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  capacity: { storage: 2Gi }
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
  claimRef: { namespace: media, name: seerr-config }
  mountOptions: [nfsvers=4.1, hard, noatime]
  nfs: { server: 192.168.10.247, path: /mnt/Media-Storage/Application-Storage/media/seerr-config }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-config
  namespace: media
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: akasha-app-media-seerr-config
  resources: { requests: { storage: 2Gi } }
