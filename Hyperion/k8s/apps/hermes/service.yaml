# LB → nginx basic-auth proxy (:8080) → dashboard (pod-loopback :9119).
apiVersion: v1
kind: Service
metadata:
  name: hermes-dashboard
  namespace: hermes
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.52
spec:
  type: LoadBalancer
  selector:
    app: hermes
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: webhook
      port: 8644
      targetPort: 8644
