apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate            # RWO PVC — never two pods mounting at once
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      # Schedule on a Pi worker, not the containerized control-plane node
      # (its pods are unreachable — ADR-0002).
      nodeSelector:
        topology.kubernetes.io/zone: hyperion
      initContainers:
        # Seed config.yaml onto the PVC only if absent (preserves dashboard edits).
        - name: seed-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - '[ -f /opt/data/config.yaml ] || cp /seed/config.yaml /opt/data/config.yaml'
          volumeMounts:
            - { name: data, mountPath: /opt/data }
            - { name: config-seed, mountPath: /seed }
      containers:
        # ── Hermes gateway + supervised dashboard (s6) ──────────────────────
        - name: hermes
          image: ghcr.io/stevengann/hermes-agent:latest
          args: ["gateway", "run"]
          env:
            - { name: HERMES_HOME,            value: "/opt/data" }
            - { name: HERMES_UID,             value: "10000" }
            - { name: HERMES_GID,             value: "10000" }
            - { name: HERMES_DASHBOARD,       value: "1" }
            - { name: HERMES_DASHBOARD_HOST,  value: "127.0.0.1" }   # loopback → no OAuth gate; sidecar-only
            - { name: HERMES_DASHBOARD_PORT,  value: "9119" }
            - { name: HERMES_DASHBOARD_TUI,   value: "1" }           # in-browser chat tab
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-deepseek
                  key: DEEPSEEK_API_KEY
          volumeMounts:
            - { name: data, mountPath: /opt/data }
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
        # ── basic-auth reverse proxy (the only thing the LB exposes) ────────
        - name: dashboard-proxy
          image: nginx:1.30.1-alpine
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: proxy-conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf }
            - { name: htpasswd,   mountPath: /etc/nginx/.htpasswd,           subPath: .htpasswd }
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "10m",  memory: "16Mi" }
            limits:   { cpu: "200m", memory: "64Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: config-seed
          configMap:
            name: hermes-config-seed
        - name: proxy-conf
          configMap:
            name: hermes-dashboard-proxy
        - name: htpasswd
          secret:
            secretName: hermes-dashboard-auth
            items:
              - { key: .htpasswd, path: .htpasswd }
