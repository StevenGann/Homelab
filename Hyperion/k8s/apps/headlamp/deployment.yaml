apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    app: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      # Run on the Pi workers, NOT the containerized control-plane node — that
      # node's flannel VTEP is its docker-internal IP (172.19.0.2), unreachable
      # from the workers, so a pod there is unreachable via the MetalLB VIP.
      # The control plane should be API+datastore only (see the --disable-agent
      # follow-up); pinning apps to the hyperion zone is the safe interim.
      nodeSelector:
        topology.kubernetes.io/zone: hyperion
      serviceAccountName: headlamp          # minimal SA — login is via the admin token
      automountServiceAccountToken: true
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:v0.42.0
          args:
            - "-in-cluster"
            - "-plugins-dir=/headlamp/plugins"
          ports:
            - name: http
              containerPort: 4466
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
