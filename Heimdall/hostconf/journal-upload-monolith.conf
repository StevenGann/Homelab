# Heimdall — systemd-journal-upload drop-in.
#
# Installed to /etc/systemd/journal-upload.conf.d/monolith.conf by setup.sh.
# Mirrors the Hyperion pattern: ship all journal entries (including Docker journald
# log driver output for every container) to Monolith's journal-remote receiver.
#
# Monolith side: docker-compose service `journal-remote` listening on :19532.
# Persistent local journal kept (under /var/log/journal) so we have local buffering
# when Monolith is unreachable.

[Upload]
URL=http://192.168.10.247:19532
