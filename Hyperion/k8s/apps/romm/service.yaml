---
apiVersion: v1
kind: Service
metadata:
  name: romm
  namespace: romm
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.78
spec:
  type: LoadBalancer
  selector:
    app: romm
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: app
      port: 8080
      targetPort: 8080
