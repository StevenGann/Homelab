name: Poll caddy-l4 releases

# Weekly check for new caddy-l4 plugin releases. Dependabot's `package-ecosystem: docker`
# does NOT parse `xcaddy --with` lines (verified against dependabot-core issue #5103), so
# this scheduled workflow is the standing mechanism for plugin version tracking. If a
# new tag is found, opens a PR bumping both the Dockerfile's `--with` line and the image
# tag in Heimdall/docker-compose.yml in one commit.
#
# History: resolves iter-1 known concern #3 (the Dependabot mechanism the parent run
# proposed was empirically false).

on:
  schedule:
    - cron: '0 13 * * 1'   # Mondays 13:00 UTC
  workflow_dispatch:

concurrency:
  group: poll-caddy-l4-releases
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - name: Compare pinned caddy-l4 version with upstream latest
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest=$(gh release view -R mholt/caddy-l4 --json tagName -q .tagName)
          pinned=$(grep -oP 'caddy-l4@\Kv[0-9]+\.[0-9]+\.[0-9]+' Heimdall/caddy/image/Dockerfile)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "pinned=$pinned" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$pinned" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if newer
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          new="${{ steps.check.outputs.latest }}"
          old="${{ steps.check.outputs.pinned }}"
          new_no_v="${new#v}"

          branch="deps/caddy-l4-${new}"
          # Skip if a branch for this version already exists (avoid duplicate PRs).
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Branch $branch already exists; skipping."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$branch"

          # Bump Dockerfile: caddy-l4@vX.Y.Z
          sed -i -E "s|caddy-l4@v[0-9.]+|caddy-l4@${new}|" Heimdall/caddy/image/Dockerfile

          # Bump compose image tag: ...-l4-X.Y.Z (without the v prefix)
          sed -i -E "s|-l4-[0-9.]+\b|-l4-${new_no_v}|" Heimdall/docker-compose.yml

          git add Heimdall/caddy/image/Dockerfile Heimdall/docker-compose.yml
          git commit -m "deps: bump caddy-l4 to ${new}"
          git push -u origin "$branch"

          # Write the PR body to a file. Built via echo (not heredoc) because
          # this `run:` block uses YAML `|` literal-scalar indentation; any
          # heredoc body lines would inherit that leading whitespace, which
          # markdown would render as a code block in the PR.
          BODY_FILE=$(mktemp)
          {
            echo "Auto-generated by .github/workflows/poll-caddy-l4-releases.yml."
            echo
            echo "Review the upstream release notes before merging: https://github.com/mholt/caddy-l4/releases/tag/${new}"
            echo
            echo "After merge, the build-heimdall-caddy-img.yml workflow will rebuild and publish the image. Heimdall pulls the new image via Komodo or \`docker compose pull\`."
          } > "$BODY_FILE"
          gh pr create \
            --title "deps: bump caddy-l4 ${old} → ${new}" \
            --body-file "$BODY_FILE"
          rm -f "$BODY_FILE"
