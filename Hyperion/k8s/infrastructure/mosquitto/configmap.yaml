apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: mosquitto
data:
  mosquitto.conf: |
    # ── Listeners ──────────────────────────────────────────
    listener 1883 0.0.0.0
    protocol mqtt

    # ── Persistence ────────────────────────────────────────
    persistence true
    persistence_location /mosquitto/data/
    autosave_interval 300

    # ── Auth ───────────────────────────────────────────────
    allow_anonymous false
    password_file /mosquitto/config/passwd

    # ── Logging ────────────────────────────────────────────
    log_dest stdout
    log_type all
    connection_messages true
