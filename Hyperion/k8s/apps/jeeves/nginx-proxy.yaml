# Basic-auth reverse proxy for Jeeves dashboard (same pattern as Hermes).
apiVersion: v1
kind: ConfigMap
metadata:
  name: jeeves-dashboard-proxy
  namespace: jeeves
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      client_max_body_size 25m;

      auth_basic           "Jeeves Dashboard";
      auth_basic_user_file /etc/nginx/.htpasswd;

      location / {
        proxy_pass         http://127.0.0.1:9119;
        proxy_http_version 1.1;
        proxy_set_header   Host              localhost:9119;
        proxy_set_header   Origin            http://localhost:9119;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
      }
    }
