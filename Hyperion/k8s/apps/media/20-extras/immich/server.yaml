apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: media
  labels:
    app: immich
    component: server
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.88
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.10.88
  selector:
    app: immich
    component: server
  ports:
    - name: http
      port: 2283
      targetPort: 2283
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: media
  labels:
    app: immich
    component: server
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO library PVC (NFS RWX, but Recreate for Postgres co-location pattern)
  selector:
    matchLabels:
      app: immich
      component: server
  template:
    metadata:
      labels:
        app: immich
        component: server
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: hyperion
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          env:
            - name: IMMICH_VERSION
              value: release
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: DB_PASSWORD
            - name: DB_DATABASE_NAME
              value: immich
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: UPLOAD_LOCATION
              value: /usr/src/app/upload
            - name: TYPESENSE_ENABLED
              value: "false"
            - name: IMMICH_HOST
              value: 0.0.0.0
            - name: MACHINE_LEARNING_URL
              value: http://immich-ml:3003
          ports:
            - name: http
              containerPort: 2283
          volumeMounts:
            - name: library
              mountPath: /usr/src/app/upload
          startupProbe:
            httpGet:
              path: /
              port: 2283
            initialDelaySeconds: 30
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 2283
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 2283
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: immich-library
