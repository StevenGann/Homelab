name: Build and publish journal-remote image

on:
  push:
    branches: [main]
    paths:
      - 'Heimdall/hyperion/journal-remote/**'
  workflow_dispatch:

concurrency:
  group: build-journal-remote
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push journal-remote image
        uses: docker/build-push-action@v5
        with:
          context: Heimdall/hyperion/journal-remote
          push: true
          # :latest stays for operator visibility; :sha-<commit> is the
          # immutable rollback target Compose should pin to (Tier 3.3 of
          # the dev-hyperion-flashing-to-heimdall pipeline FINAL.md).
          tags: |
            ghcr.io/stevengann/homelab-journal-remote:latest
            ghcr.io/stevengann/homelab-journal-remote:sha-${{ github.sha }}
