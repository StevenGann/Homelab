  #     - <NFS media library>:/media          # from Akasha
  #     - <NFS shared transcode cache>:/temp   # from Akasha (EXDEV-safe shared cache)
  #   deploy:
  #     resources: { reservations: { devices: [ { driver: nvidia, count: all, capabilities: [gpu, video] } ] } }
  #   logging: { driver: journald }

  # ─── Pterodactyl Wings (Minecraft — no GPU) ─────────────────────────────────
  # STAGED — enable after creating the Thoth node in the panel (192.168.10.69) to
  # mint the token (→ SOPS secret). Runs game-server containers via the docker
  # socket; game data on the Samsung SSD (/fast). Ports 8080/2022 + game ports.
