name: Build and publish heimdall-caddy image

on:
  push:
    branches: [main]
    paths:
      - 'Heimdall/caddy/image/**'
  workflow_dispatch:

concurrency:
  group: build-heimdall-caddy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push heimdall-caddy image
        uses: docker/build-push-action@v5
        with:
          context: Heimdall/caddy/image
          push: true
          # Pin tag matches the Dockerfile's pins: Caddy + caddy-l4 versions.
          # No :latest — per iter-1 known concern #10.
          tags: ghcr.io/stevengann/homelab-heimdall-caddy:v2.11.3-l4-0.1.1
