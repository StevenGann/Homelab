apiVersion: v1
kind: Service
metadata:
  name: agent-caldera
  namespace: agent-caldera
  labels:
    app: agent-caldera
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.10.85
spec:
  type: LoadBalancer
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: agent-caldera
