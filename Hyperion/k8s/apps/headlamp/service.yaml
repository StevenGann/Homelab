apiVersion: v1
kind: Service
metadata:
  name: headlamp
  namespace: headlamp
  annotations:
    # Pin a stable, bookmarkable address from the MetalLB pool (.10–.99).
    metallb.io/loadBalancerIPs: 192.168.10.50
spec:
  type: LoadBalancer
  selector:
    app: headlamp
  ports:
    - name: http
      port: 80
      targetPort: 4466
