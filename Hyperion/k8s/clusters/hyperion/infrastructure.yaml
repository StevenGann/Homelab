# Cluster entrypoint for infrastructure components. The root `flux-system`
# Kustomization (flux-system/gotk-sync.yaml) reconciles this directory; these
# Flux Kustomizations then reconcile the actual manifests under
# ./Hyperion/k8s/infrastructure.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/infrastructure/metallb/install
  prune: true
  wait: true            # block metallb-config until the controller + webhook are Ready
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/infrastructure/metallb/config
  prune: true
  dependsOn:
    - name: metallb     # CRDs + validating webhook must exist first
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mosquitto
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/infrastructure/mosquitto
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: metallb-config     # needs the MetalLB pool for its LoadBalancer IP
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-caldera
  namespace: flux-system
spec:
  interval: 10m
  path: ./Hyperion/k8s/infrastructure/agent-caldera
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: metallb-config
  sourceRef:
    kind: GitRepository
    name: flux-system
