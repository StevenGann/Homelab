# radarr-config on node-local local-path (/mnt/node-storage), NOT NFS.
# 2026-06-05: Radarr's SQLite DB flapped on NFS (file-lock + latency -> 3-10
# restarts/hr); moved back to node-local local-path, which it tolerates. Interim
# ahead of Longhorn (docs/design/adr-0003-longhorn-deferred.md).
#
# local-path is WaitForFirstConsumer + node-pinned: the PV (and therefore the
# pod, via node affinity) stays on whichever worker it was first provisioned on.
# Data was migrated off the Akasha NFS export by
# Hyperion/k8s/scripts/migrate-config-nfs-to-localpath.sh (the Akasha copy is
# Retain-preserved as a cold backup). prune:disabled so an accidental git
# removal can't delete the volume (local-path reclaimPolicy is Delete).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-config
  namespace: media
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources: { requests: { storage: 2Gi } }
