name: Build and publish Node IMG

# Build the Node IMG natively on ubuntu-24.04-arm.
# Native ARM runners (GA 2025-08-07 for public repos) drop wall-clock from
# ~60-90 min (QEMU emulation on ubuntu-latest) to ~5-8 min. The QEMU binfmt
# setup is no longer needed.
#
# This file is retired alongside the Node IMG itself on 2026-08-15 (see
# docs/pipeline-runs/20260523T050133Z-dev-nixos-identity-usb/FINAL.md).
# Until then, the native-runner cut is a no-regret win that survives the
# pivot's outcome.

on:
  push:
    branches: [main]
    paths:
      - 'Hyperion/packer/rpi-node.pkr.hcl'
      - 'Hyperion/packer/files/**'
  workflow_dispatch:

concurrency:
  group: build-images
  cancel-in-progress: false

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Cache Pi OS base image
        uses: actions/cache@v5
        with:
          path: ~/.packer-cache
          key: pios-node-${{ hashFiles('Hyperion/packer/rpi-node.pkr.hcl') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd curl jq

      - name: Install Packer
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq && sudo apt-get install -y -qq packer
          packer plugins install github.com/solo-io/arm-image

      - name: Generate version (Unix epoch)
        run: echo "VERSION=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build Node IMG
        working-directory: Hyperion/packer
        run: |
          sudo packer build \
            -var "image_version=${{ env.VERSION }}" \
            -var "ssh_public_key=${{ secrets.NODE_SSH_PUBLIC_KEY }}" \
            rpi-node.pkr.hcl

      - name: Compress with zstd
        run: |
          IMG_FILE="rpi-node-${{ env.VERSION }}.img.zst"
          echo "IMG_FILE=$IMG_FILE" >> "$GITHUB_ENV"
          zstd -19 -T0 Hyperion/packer/output/rpi-node.img -o "$IMG_FILE"
          echo "IMG_SHA256=$(sha256sum "$IMG_FILE" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "node-v${{ env.VERSION }}" \
            --title "Node IMG v${{ env.VERSION }}" \
            --notes "SHA256: ${{ env.IMG_SHA256 }}" \
            "${{ env.IMG_FILE }}"
