apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: n8n
  annotations: { metallb.io/loadBalancerIPs: 192.168.10.71 }
spec:
  type: LoadBalancer
  selector: { app: n8n }
  ports:
    - { name: http, port: 5678, targetPort: 5678 }
    - { name: web,  port: 80,   targetPort: 5678 }   # bare http://n8n.lab
