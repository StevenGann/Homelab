apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
  labels:
    app: uptime-kuma
spec:
  replicas: 1
  # RWO local-path PVC + node-local data → Recreate (a RollingUpdate would
  # deadlock: the new pod can't mount the PVC while the old pod holds it).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: hyperion   # Pi workers (reachable networking)
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:1.23.16
          ports:
            - name: http
              containerPort: 3001
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet: { path: /, port: 3001 }
            initialDelaySeconds: 45
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /, port: 3001 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
