apiVersion: v1
kind: Service
metadata:
  name: komga
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.82
spec:
  type: LoadBalancer
  selector: { app: komga }
  ports:
    - { name: http, port: 25600, targetPort: 25600 }
    - { name: web,  port: 80,   targetPort: 25600 }   # bare http://komga.lab
