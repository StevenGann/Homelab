# Heimdall — k3s control plane
#
# Separate stack from Heimdall/docker-compose.yml (Komodo + Caddy + Technitium)
# and Heimdall/hyperion/ (image-hosting + journal-remote). This stack is the
# replacement for the broken k3s server on Akasha (formerly Monolith); Akasha
# is being renovated into a pure-storage role once Hyperion is operational.
#
# Posture: TEMPORARY-on-Heimdall, same as Heimdall/hyperion/. Once the
# Hyperion cluster is stable under workloads, a follow-up pipeline decides
# whether to migrate the control plane onto the cluster itself or formally
# adopt Heimdall as the permanent home. The §3.11-style portability rule
# applies: ALL state lives under /opt/Homelab/Heimdall/k3s-control-plane/
# so future re-migration is `rsync one root + swap one IP + redeploy`.
# Do not add bind-mounts that escape this root.
#
# Image version: v1.34.5-k3s1 aligns with nixpkgs nixos-25.11's worker k3s
# (1.34.5). Same-minor server+worker means no version-skew concerns. If
# nixpkgs bumps to 1.35+, bump this tag in lockstep.
#
# Deploy: ../scripts/deploy.sh on the workstation handles secret-ship +
# stack-up. Manual path:
#   ssh owner@192.168.10.4
#   cd /opt/Homelab/Heimdall/k3s-control-plane
#   docker compose up -d
#
# Token rotation: see README.md §"Rotating the join token".
# Kubeconfig retrieval: see README.md §"Getting kubectl access".

services:

  k3s-server:
    image: rancher/k3s:v1.34.5-k3s1
    # The control plane runs in a container, so by default the apiserver
    # advertises its docker-internal IP (172.19.0.2) as the `kubernetes`
    # service endpoint — which the Pi workers can't route to, breaking
    # in-cluster API access (10.43.0.1:443) for every pod on a worker
    # (observed 2026-06-01 via MetalLB's speaker crash-looping). Advertise the
    # host LAN IP instead, and add it as a cert SAN so workstation kubectl to
    # 192.168.10.4:6443 also validates.
    # --node-taint: the control plane runs in a container with a docker-internal
    # flannel VTEP (172.19.0.2) unreachable from the Pi workers, so any workload
    # pod scheduled here is unreachable (cluster DNS, MetalLB-backed apps, …).
    # Taint it NoExecute so it stays API+datastore-only and all workloads run on
    # the properly-networked Pis. (We keep the embedded agent — kube-proxy/flannel
    # — so the apiserver can still reach webhooks/aggregated APIs on Pi pods,
    # which the control-plane→Pi direction handles fine.)
    command: server --advertise-address=192.168.10.4 --tls-san=192.168.10.4 --node-taint=node.homelab/control-plane-only=true:NoExecute
    privileged: true
    restart: unless-stopped
    environment:
      - K3S_TOKEN=${K3S_TOKEN}
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=644
      # Servers don't run workloads — no need to advertise Flannel readiness
      # via the kubelet on the control plane itself. Disable the embedded
      # workload-class services so the server is just an API + datastore.
      # (k3s 1.34 supports --disable-agent on the server role.)
      - K3S_NODE_NAME=heimdall-control-plane
    volumes:
      - /opt/Homelab/Heimdall/k3s-control-plane/server:/var/lib/rancher/k3s
      - /opt/Homelab/Heimdall/k3s-control-plane/kubeconfig:/output
    ports:
      - "6443:6443"      # Kubernetes API — Hyperion workers + operator kubectl
      - "8472:8472/udp"  # Flannel VXLAN — pod-network plane between workers
    healthcheck:
      test: ["CMD", "k3s", "kubectl", "get", "--raw", "/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: journald
