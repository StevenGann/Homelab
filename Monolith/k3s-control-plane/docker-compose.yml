services:
  k3s-server:
    image: rancher/k3s:v1.35.3-k3s1
    command: server
    privileged: true
    restart: unless-stopped
    environment:
      - K3S_TOKEN=${K3S_TOKEN}
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=644
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - /mnt/App-Storage/Container-Data/k3s-control-plane/kubeconfig:/output
    ports:
      - "6443:6443"      # Kubernetes API
      - "8472:8472/udp"  # Flannel VXLAN
    healthcheck:
      test: ["CMD", "k3s", "kubectl", "get", "--raw", "/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - /mnt/App-Storage/Container-Data/k3s-control-plane/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/Media-Storage/Infra-Storage/images:/srv/images:ro
    ports:
      - "50011:50011"    # Image serving
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:50011/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  ci-deploy:
    image: ghcr.io/stevengann/homelab-ci-deploy:latest
    restart: unless-stopped
    environment:
      - GITHUB_REPO=StevenGann/Homelab
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - POLL_INTERVAL=300
    volumes:
      - /mnt/Media-Storage/Infra-Storage/images:/images
    healthcheck:
      # Verify the status file was written within the last 15 minutes (3× poll interval)
      test: ["CMD-SHELL", "test -f /images/ci-deploy-status.json && test $$(( $(date +%s) - $(date -d $(jq -r .last_poll /images/ci-deploy-status.json) +%s) )) -lt 900"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  healthcheck:
    image: ghcr.io/stevengann/homelab-healthcheck:latest
    restart: unless-stopped
    environment:
      - NGINX_URL=http://nginx:50011
      - SCAN_INTERVAL=600
    volumes:
      - /mnt/Media-Storage/Infra-Storage/images:/images:ro
    ports:
      - "50012:8080"    # IaC health API
    depends_on:
      nginx:
        condition: service_healthy
      ci-deploy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/summary || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  k3s-server:
