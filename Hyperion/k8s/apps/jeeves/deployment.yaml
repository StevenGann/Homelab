apiVersion: apps/v1
kind: Deployment
metadata:
  name: jeeves
  namespace: jeeves
  labels:
    app: jeeves
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jeeves
  template:
    metadata:
      labels:
        app: jeeves
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: hyperion
      initContainers:
        - name: seed-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - '[ -f /opt/data/config.yaml ] || cp /seed/config.yaml /opt/data/config.yaml'
          volumeMounts:
            - { name: data, mountPath: /opt/data }
            - { name: config-seed, mountPath: /seed }
      containers:
        - name: jeeves
          image: ghcr.io/stevengann/hermes-agent:latest
          args: ["gateway", "run"]
          env:
            - { name: HERMES_HOME,            value: "/opt/data" }
            - { name: HERMES_UID,             value: "10000" }
            - { name: HERMES_GID,             value: "10000" }
            - { name: HERMES_DASHBOARD,       value: "1" }
            - { name: HERMES_DASHBOARD_HOST,  value: "127.0.0.1" }
            - { name: HERMES_DASHBOARD_PORT,  value: "9119" }
            - { name: HERMES_DASHBOARD_TUI,   value: "1" }
            # LLM provider — SOPS encrypted secret
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jeeves-deepseek
                  key: DEEPSEEK_API_KEY
            # Discord — disabled until token provided
            # Shared tokens (from Hermes .env)
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jeeves-shared
                  key: GITHUB_TOKEN
            - name: HASS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jeeves-shared
                  key: HASS_TOKEN
          volumeMounts:
            - { name: data, mountPath: /opt/data }
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
        - name: dashboard-proxy
          image: nginx:1.30.1-alpine
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: proxy-conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf }
            - { name: htpasswd,   mountPath: /etc/nginx/.htpasswd,           subPath: .htpasswd }
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "10m",  memory: "16Mi" }
            limits:   { cpu: "200m", memory: "64Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jeeves-data
        - name: config-seed
          configMap:
            name: jeeves-config-seed
        - name: proxy-conf
          configMap:
            name: jeeves-dashboard-proxy
        - name: htpasswd
          secret:
            secretName: jeeves-dashboard-auth
            items:
              - { key: .htpasswd, path: .htpasswd }
