# Shared logic for every DHT22 temperature node.
# Included as an ESPHome package by each file in nodes/ (lists deep-merge, so a
# node can append sensors without clobbering these). Per-node values come in via
# substitutions; credentials via !secret (resolved from common/secrets.yaml relay).
# See docs/plan/implementation-plan.md.

substitutions:
  node_name: temp-node             # OVERRIDE per node — device/hostname identity (mDNS, OTA)
  friendly_name: "Temp Node"       # OVERRIDE per node — HA display name
  location: node                   # OVERRIDE per node — short MQTT name: sensors/<location>/{temperature,humidity}
  dht_pin: "D5"                    # GPIO14 — standardized. Do NOT use D4 (GPIO2 = LED/strapping).
  update_interval: "60s"

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}

esp8266:
  board: d1_mini

logger:

# --- Home Assistant native API (canonical source of truth) ---
api:
  encryption:
    key: !secret api_encryption_key
  # MQTT is enabled below. With MQTT on, ESPHome reboots every 15 min if no native
  # API client connects (default reboot_timeout: 15min). 0s disables that loop so
  # the node keeps feeding MQTT-only consumers even when HA is down.
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback AP + captive portal = headless OTA-failure recovery net.
  ap:
    ssid: "${node_name} fallback"
    password: !secret fallback_ap_password

captive_portal:

# --- MQTT second output (for non-HA consumers: Node-RED/Grafana/scripts) ---
mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  # Clean topic scheme: sensors/<location>/temperature and .../humidity (set as
  # explicit state_topic per sensor below). status/LWT + debug inherit this prefix
  # → sensors/<location>/status, sensors/<location>/debug.
  topic_prefix: sensors/${location}
  # HA gets entities from the native API, so disable MQTT discovery to avoid
  # duplicate HA entities. The broker still receives raw state + status topics.
  discovery: false
  # Birth/will (LWT) default to retained <topic_prefix>/status = online/offline.
  # Consumers MUST gate on status == online to avoid trusting a stale retained value.

sensor:
  - platform: dht
    model: DHT22                   # set explicitly; do not rely on auto-detect
    pin: ${dht_pin}
    update_interval: ${update_interval}
    # Breakout module has an onboard pull-up -> pullup: false (no external resistor).
    # For a bare 4-pin sensor: add an external 4.7k DATA->3.3V resistor.
    temperature:
      name: "${friendly_name} Temperature"
      state_topic: sensors/${location}/temperature
      filters:
        - filter_out: nan          # drop sensor dropouts before they propagate
    humidity:
      name: "${friendly_name} Humidity"
      state_topic: sensors/${location}/humidity
      filters:
        - filter_out: nan
