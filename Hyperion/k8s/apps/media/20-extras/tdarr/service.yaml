apiVersion: v1
kind: Service
metadata:
  name: tdarr
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.62
spec:
  type: LoadBalancer
  selector: { app: tdarr }
  ports:
    - { name: webui,  port: 8265, targetPort: 8265 }
    - { name: server, port: 8266, targetPort: 8266 }   # Thoth worker connects here
    - { name: web,    port: 80,   targetPort: 8265 }   # bare http://tdarr.lab → webui
