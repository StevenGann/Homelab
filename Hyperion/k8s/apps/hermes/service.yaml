# LB → nginx basic-auth proxy (:8080) → dashboard (pod-loopback :9119).
apiVersion: v1
kind: Service
metadata:
  name: hermes-dashboard
  namespace: hermes
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.52
spec:
  type: LoadBalancer
  selector:
    app: hermes
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# ClusterIP so in-cluster apps (Caldera) can reach Hermes's webhook receiver
# (config platforms.webhook → 0.0.0.0:8644) at hermes.hermes.svc.cluster.local:8644.
# Internal only — the dashboard LB above is the external path.
apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: hermes
spec:
  type: ClusterIP
  selector:
    app: hermes
  ports:
    - name: webhook
      port: 8644
      targetPort: 8644
