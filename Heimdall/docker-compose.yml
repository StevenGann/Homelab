# Heimdall — Compose stack
#
# Six services. Komodo Periphery is NOT here — it's a host systemd binary installed by
# Heimdall/scripts/setup.sh (the "five things to manage" architectural choice; see the
# pipeline-run FINAL.md).
#
# Bring-up order (resolved by depends_on + restart policies):
#   1. mongo               (komodo-core depends on it)
#   2. komodo-core         (manages the rest via the local Periphery)
#   3. technitium          (bridge net :5353; .lab authoritative + fwd 1.1.1.1/8.8.8.8)
#   4. pihole              (host networking; owns :53; forwards .lab -> technitium)
#   5. caddy               (host networking; binds 80, 443, 443/udp, plus L4 ports)
#   6. ddns-updater        (NoIP dynamic DNS for the public .ddns.net domains)

services:

  # ─── Komodo MongoDB (komodo-core's database) ────────────────────────────────────────
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    command:
      - "mongod"
      - "--wiredTigerCacheSizeGB"
      - "0.25"            # cap WT cache at 250 MB; total RSS settles at ~0.5-1 GB steady state
      - "--auth"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${KOMODO_DATABASE_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${KOMODO_DATABASE_PASSWORD}
    volumes:
      - /opt/Homelab/Heimdall/komodo-data/mongo-data:/data/db
      - /opt/Homelab/Heimdall/komodo-data/mongo-config:/data/configdb
    logging:
      driver: journald
    # No published ports — reachable only on the default compose bridge network as `mongo`.

  # ─── Komodo Core ────────────────────────────────────────────────────────────────────
  komodo-core:
    image: ghcr.io/moghtech/komodo-core:2.2.0
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      # Bind to localhost only — Caddy reverse-proxies komodo.lab → 127.0.0.1:9120.
      # nftables additionally allows LAN-direct access for break-glass operator use.
      - "127.0.0.1:9120:9120"
    environment:
      - KOMODO_DATABASE_ADDRESS=mongo:27017
      - KOMODO_DATABASE_USERNAME=${KOMODO_DATABASE_USERNAME}
      - KOMODO_DATABASE_PASSWORD=${KOMODO_DATABASE_PASSWORD}
      - KOMODO_HOST=https://komodo.lab
      - KOMODO_LOCAL_AUTH=true
      - KOMODO_INIT_ADMIN_USERNAME=${KOMODO_INIT_ADMIN_USERNAME}
      - KOMODO_INIT_ADMIN_PASSWORD=${KOMODO_INIT_ADMIN_PASSWORD}
      - KOMODO_JWT_SECRET=${KOMODO_JWT_SECRET}
      - KOMODO_WEBHOOK_SECRET=${KOMODO_WEBHOOK_SECRET}
      - KOMODO_RESOURCE_POLL_INTERVAL=1-hr   # drift detection ON; auto-deploy OFF (Stack-level setting)
      - KOMODO_DISABLE_USER_REGISTRATION=true
      - TZ=America/Chicago
    volumes:
      - /opt/Homelab/Heimdall/komodo-data/keys:/etc/komodo/keys
      - /opt/Homelab/Heimdall/komodo-data/repos:/etc/komodo/repos
      - /opt/Homelab/Heimdall/komodo-data/backups:/etc/komodo/backups
    logging:
      driver: journald

  # ─── Technitium DNS Server ──────────────────────────────────────────────────────────
  technitium:
    image: technitium/dns-server:15.2.0
    restart: unless-stopped
    # Moved from host to bridge networking (2026-06-27). Pi-hole now owns :53.
    # Only reachable from Heimdall itself on localhost.
    ports:
      - "127.0.0.1:5353:53/tcp"
      - "127.0.0.1:5353:53/udp"
      - "127.0.0.1:5380:5380/tcp"
    environment:
      - DNS_SERVER_DOMAIN=heimdall.lab
      - DNS_SERVER_ADMIN_PASSWORD_FILE=/run/secrets/technitium-admin-pw
      - DNS_SERVER_LOG_FOLDER_PATH=/var/log/technitium/dns
    volumes:
      - /opt/Homelab/Heimdall/technitium/config:/etc/dns
      - /opt/Homelab/Heimdall/technitium/logs:/var/log/technitium/dns
      - /opt/Homelab/Heimdall/secrets/technitium-admin-pw:/run/secrets/technitium-admin-pw:ro
    logging:
      driver: journald

  # ─── Pi-hole DNS + Ad Blocking ──────────────────────────────────────────────────────
  pihole:
    image: pihole/pihole:2026.06.0
    restart: unless-stopped
    network_mode: host        # real client IPs for per-device stats
    depends_on:
      - technitium            # .lab forwarding target must be up
    environment:
      - TZ=America/Chicago
      - WEBPASSWORD_FILE=/run/secrets/pihole-webpassword
      - PIHOLE_DNS_=1.1.1.1;1.0.0.1
      - FTLCONF_webserver_port=8180o,[::]:8180o
      - FTLCONF_misc_etc_dnsmasq_d=true
      - FTLCONF_dns_listeningMode=ALL
      - DNSSEC=true
      - DNSMASQ_LISTENING=all
      # Conditional forwarding handled by mounted dnsmasq config
      # (02-lan.conf: server=/lab/127.0.0.1#5353)
    volumes:
      - /opt/Homelab/Heimdall/pihole/etc-pihole:/etc/pihole
      - /opt/Homelab/Heimdall/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
      - /opt/Homelab/Heimdall/secrets/pihole-webpassword:/run/secrets/pihole-webpassword:ro
    logging:
      driver: journald

  # ─── Caddy (custom image with caddy-l4 plugin) ──────────────────────────────────────
  caddy:
    image: ghcr.io/stevengann/homelab-heimdall-caddy:v2.11.3-l4-0.1.2
    restart: unless-stopped
    network_mode: host        # required for L4 source-IP preservation on game traffic
                              # (iter-1 known concern #1)
    volumes:
      - /opt/Homelab/Heimdall/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/Homelab/Heimdall/caddy/data:/data
      - /opt/Homelab/Heimdall/caddy/config:/config
    logging:
      driver: journald

  # ─── Dynamic DNS (NoIP) — public A records for stevengann / the-elevator /
  # the-monolith .ddns.net. This is the real public-DNS path (Caddyfile points
  # jf.stevengann.com → monolith.ddns.net). Config (3 NoIP host creds) is
  # SOPS-encrypted at Heimdall/secrets/ddns-config.json.sops and shipped by
  # deploy.sh to the data dir below. Captured into git 2026-07-04 — was a
  # host-only orphan container (DR report C3).
  ddns-updater:
    image: qmcgaw/ddns-updater:v2.10.0
    restart: unless-stopped
    environment:
      - PERIOD=15m
      - CONFIG_FILEPATH=/updater/data/config.json
    volumes:
      - /opt/Homelab/Heimdall/ddns-updater/data:/updater/data
    logging:
      driver: journald
