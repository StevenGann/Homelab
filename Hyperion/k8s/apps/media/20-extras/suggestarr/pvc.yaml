# suggestarr-config — ROLLED BACK to node-local (local-path) on 2026-06-14.
# The 2026-06-05 NFS flip was reverted because the Akasha export dir
# /mnt/Media-Storage/Application-Storage/media/suggestarr-config was never created,
# so the NFS mount failed ("No such file or directory") and the app could not start.
# Bound by volumeName to the original dynamically-provisioned PV (data preserved;
# PV reclaim policy is Retain). Re-do the NFS migration deliberately later:
#   1) create the dir on Akasha, 2) copy data in, 3) flip this back to the NFS PV.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: suggestarr-config
  namespace: media
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  volumeName: pvc-74d6d860-97d2-476d-98a3-906137df2c84
  resources: { requests: { storage: 1Gi } }
