apiVersion: v1
kind: Service
metadata:
  name: lidarr
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.65
spec:
  type: LoadBalancer
  selector: { app: lidarr }
  ports:
    - { name: http, port: 8686, targetPort: 8686 }
    - { name: web,  port: 80,   targetPort: 8686 }   # bare http://lidarr.lab
