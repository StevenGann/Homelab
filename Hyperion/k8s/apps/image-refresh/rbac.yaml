# Least-privilege identity for the nightly image-refresh CronJob: it only needs
# to find auto-refresh-labelled Deployments cluster-wide and restart them
# (rollout restart = patch the pod-template annotations).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-refresher
  namespace: image-refresh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: image-refresher
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: image-refresher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: image-refresher
subjects:
  - kind: ServiceAccount
    name: image-refresher
    namespace: image-refresh
