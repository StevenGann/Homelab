name: Build and publish journal-remote image

on:
  push:
    branches: [main]
    paths:
      - 'Monolith/k3s-control-plane/journal-remote/**'
  workflow_dispatch:

concurrency:
  group: build-journal-remote
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push journal-remote image
        uses: docker/build-push-action@v5
        with:
          context: Monolith/k3s-control-plane/journal-remote
          push: true
          tags: ghcr.io/stevengann/homelab-journal-remote:latest
