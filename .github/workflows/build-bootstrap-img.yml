name: Build Bootstrap IMG

on:
  push:
    branches: [main]
    paths:
      - 'Hyperion/packer/rpi-bootstrap.pkr.hcl'
      - 'Hyperion/packer/files/bootstrap.sh'
      - 'Hyperion/packer/files/bootstrap.service'
  workflow_dispatch:

concurrency:
  group: build-images
  cancel-in-progress: false

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Cache Pi OS base image
        uses: actions/cache@v4
        with:
          path: ~/.packer-cache
          key: pios-bootstrap-${{ hashFiles('Hyperion/packer/rpi-bootstrap.pkr.hcl') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support curl zstd

      - name: Register QEMU binfmt handlers
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Install Packer
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq && sudo apt-get install -y -qq packer
          packer plugins install github.com/solo-io/arm-image

      - name: Build Bootstrap IMG
        working-directory: Hyperion/packer
        run: sudo packer build rpi-bootstrap.pkr.hcl

      - name: Compress with zstd
        run: |
          zstd -19 -T0 Hyperion/packer/output/rpi-bootstrap.img -o rpi-bootstrap.img.zst

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete bootstrap-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create bootstrap-latest \
            --title "Bootstrap IMG (latest)" \
            --notes "Bootstrap SD card image. Rebuilt automatically on changes." \
            --prerelease \
            rpi-bootstrap.img.zst
