apiVersion: v1
kind: Service
metadata:
  name: immich-ml
  namespace: media
  labels:
    app: immich
    component: ml
spec:
  type: ClusterIP
  selector:
    app: immich
    component: ml
  ports:
    - name: http
      port: 3003
      targetPort: 3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-ml
  namespace: media
  labels:
    app: immich
    component: ml
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
      component: ml
  template:
    metadata:
      labels:
        app: immich
        component: ml
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: hyperion
      containers:
        - name: immich-ml
          image: ghcr.io/immich-app/immich-machine-learning:release
          env:
            - name: IMMICH_VERSION
              value: release
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: DB_PASSWORD
            - name: DB_DATABASE_NAME
              value: immich
            - name: REDIS_HOSTNAME
              value: immich-redis
          ports:
            - name: http
              containerPort: 3003
          livenessProbe:
            httpGet:
              path: /ping
              port: 3003
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "4"
              memory: 8Gi
