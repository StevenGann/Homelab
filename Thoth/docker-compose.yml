# Thoth — GPU compute host Compose stack
#
# Consistent with Heimdall's pattern (compose + SOPS-secrets-shipped-by deploy.sh
# + host bootstrap in scripts/setup.sh). State root: /opt/Homelab/Thoth/ for the
# config; bulk DATA lives on the ZFS pools (too big for the boot disk):
#   /tank  (raidz1, 4× HDD) → models           /fast (Samsung SSD) → game servers
#   Docker data-root → Intel SSD (ext4 @ /var/lib/docker)
#
# GPU: 2× RTX 6000 Ada via the NVIDIA Container Toolkit. Per-service device
# reservations (count: all = both GPUs). Driver 580 / CUDA 13.2 on the host.

services:

  # ─── Ollama (LLM inference — both GPUs) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest          # TODO: pin a digest after first pull
    pull_policy: always
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0"             # bind all interfaces (Service/LAN/Caddy reach it)
      OLLAMA_KEEP_ALIVE: "24h"          # keep models resident between requests
      # Allow the Caddy front (ollama.lab) + direct LAN past Ollama's origin guard.
      OLLAMA_ORIGINS: "http://ollama.lab,https://ollama.lab,http://192.168.10.144:11434"
    ports:
      - "11434:11434"                   # LAN — Heimdall Caddy proxies ollama.lab here
    volumes:
      - /tank/ollama:/root/.ollama       # models on the HDD pool (zfs tank/ollama)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all                 # both RTX 6000 Ada (operator decision)
              capabilities: [gpu]
    logging: { driver: journald }

  # ─── OpenWebUI (chat UI for Ollama) ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    pull_policy: always
    restart: unless-stopped
    depends_on: [ollama]
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"   # same compose network
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET}    # from /opt/Homelab/Thoth/.env (SOPS)
      WEBUI_URL: "http://openwebui.lab"
    ports:
      - "3000:8080"                            # Caddy fronts openwebui.lab here
    volumes:
      - /fast/open-webui:/app/backend/data      # users/chats/settings (SSD)
    logging: { driver: journald }

  # ─── ComfyUI (Stable Diffusion / image gen — GPU) ───────────────────────────
  # ai-dock image: ComfyUI on :8188, persistent /workspace. Models start EMPTY
  # (the old 329 GB ComfyUI pool was wiped) — add checkpoints under
  # /tank/comfyui/ComfyUI/models. No native auth; LAN/Caddy only.
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    pull_policy: always
    restart: unless-stopped
    environment:
      WORKSPACE: "/workspace"
      WEB_ENABLE_AUTH: "false"                 # rely on LAN/Caddy, not ai-dock's portal
      COMFYUI_ARGS: "--listen 0.0.0.0"
    ports:
      - "8188:8188"
    volumes:
      - /tank/comfyui:/workspace                # models + outputs + custom_nodes (HDD pool)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: { driver: journald }

  # ─── Komodo Periphery (manage Thoth's containers from komodo.lab) ───────────
  # v2: Core/Periphery auto-generate keypairs; onboard from the Komodo panel with
  # an onboarding key (see the runbook). Persist /etc/komodo so the keypair +
  # onboarding survive restarts.
  periphery:
    image: ghcr.io/moghtech/komodo-periphery:2.2.0   # MUST match Heimdall's komodo-core version
    restart: unless-stopped
    extra_hosts:
      - "komodo.lab:192.168.10.4"             # so periphery resolves Core (behind Caddy)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /opt/Homelab/Thoth/periphery:/config   # config + persistent keypair (/config/keys)
    ports:
      - "8120:8120"                            # Komodo Core (Heimdall) dials this
    logging: { driver: journald }

  # ─── Tdarr worker/node (hardware transcode — GPU) ───────────────────────────
  # 2026-06-04: Deployed and verified by Guppy. Connects to Tdarr server on
  # Hyperion (192.168.10.62:8266). NVENC working after driver switch to 580.
  # Media mounted via NFS from Akasha TrueNAS.
  tdarr-node:
    image: haveagitgat/tdarr_node:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      serverIP: "192.168.10.62"
      serverPort: "8266"
      nodeName: "thoth-gpu"
      TZ: "America/Los_Angeles"
    network_mode: host
    volumes:
      - /var/lib/tdarr-node/configs:/app/configs
      - /var/lib/tdarr-node/logs:/app/logs
      - /mnt/Media-Storage/Media/Movies:/mnt/Media-Storage/Media/Movies:ro
      - /mnt/Media-Storage/Media/TV-Shows:/mnt/Media-Storage/Media/TV-Shows:ro
      - /mnt/Media-Storage/Media/Downloads:/mnt/Media-Storage/Media/Downloads:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: { driver: journald }

  # ─── Pterodactyl Wings (Minecraft game-server daemon) — deployed 2026-06-07 ──
  # Runs game-server containers via the docker socket; game data on /fast (SSD).
  # config.yml (node token + allowed_origins) is shipped by scripts/deploy.sh from
  # secrets/wings-config.sops.yaml — SEEDED IF ABSENT only (Wings owns it at
  # runtime; deploy never clobbers a live file).
  #
  # PIN to the 1.11.x line to match Panel v1.11.11. Wings 1.12+ changed websocket
  # JWT handling so the panel's `*` permission no longer grants `websocket.connect`
  # → the in-browser console breaks with "jwt: missing connect permission". The
  # `:latest` tag silently pulled 1.12.3 and broke it (diagnosed + pinned
  # 2026-06-15). If you upgrade, bump the Panel and Wings together.
  #
  # allowed_origins MUST include every hostname the panel is loaded as (the browser
  # connects DIRECTLY to ws://<this host>:8080) — currently http://pterodactyl.lab.
  # The MC game port (25565) is published by the per-server container Wings creates,
  # not by this container.
  wings:
    image: ghcr.io/pterodactyl/wings:v1.11.13@sha256:98a5b9622cd152c43f1795fbc443934a25828cb1b3f7b5979cd5efb58175e869
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/pterodactyl:/etc/pterodactyl
      - /var/lib/pterodactyl:/var/lib/pterodactyl    # -> /fast (SSD)
      - /var/log/pterodactyl:/var/log/pterodactyl
      - /run/wings:/run/wings:rw
    ports:
      - "8080:8080"      # Wings API + console websocket (browser connects directly)
      - "2022:2022"      # SFTP
    logging: { driver: journald }

  # ─── BlueMap (Minecraft live web map) — deployed 2026-06-08 ─────────────────
  # Renders the Wings-managed MC world (read-only) to a 3D web map on :8100.
  # CLI jar runs under a JRE; world path is the server's data dir under
  # /var/lib/pterodactyl/<server-uuid>/world.
  # (The Jellyfin GPU-transcode test that previously lived here was
  # decommissioned 2026-06-15.)
  bluemap:
    image: eclipse-temurin:25-jre
    restart: unless-stopped
    # -r render (incremental after the first run), -u watch for live world changes,
    # -w webserver. (-w ALONE only serves pre-rendered tiles and never renders, so
    # it shows a stale map after a world swap — fixed 2026-06-15.)
    command: >
      java -jar /opt/bluemap/bluemap-5.17-cli.jar -r -u -w -c /opt/bluemap/config
    ports:
      - "8100:8100"
    volumes:
      - /opt/bluemap/config:/opt/bluemap/config
      - /opt/bluemap/maps:/opt/bluemap/maps
      - /opt/bluemap/web:/opt/bluemap/web
      - /var/lib/pterodactyl/3ad8a9e9-2984-4ed3-bc2f-beb5a6279f7c/world:/world:ro
      - /opt/bluemap/bluemap-5.17-cli.jar:/opt/bluemap/bluemap-5.17-cli.jar:ro
    logging: { driver: journald }
