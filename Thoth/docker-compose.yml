# Thoth — GPU compute host Compose stack
#
# Consistent with Heimdall's pattern (compose + SOPS-secrets-shipped-by deploy.sh
# + host bootstrap in scripts/setup.sh). State root: /opt/Homelab/Thoth/ for the
# config; bulk DATA lives on the ZFS pools (too big for the boot disk):
#   /tank  (raidz1, 4× HDD) → models           /fast (Samsung SSD) → game servers
#   Docker data-root → Intel SSD (ext4 @ /var/lib/docker)
#
# GPU: 2× RTX 6000 Ada via the NVIDIA Container Toolkit. Per-service device
# reservations (count: all = both GPUs). Driver 595 / CUDA 13.2 on the host.

services:

  # ─── Ollama (LLM inference — both GPUs) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest          # TODO: pin a digest after first pull
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0"             # bind all interfaces (Service/LAN/Caddy reach it)
      OLLAMA_KEEP_ALIVE: "24h"          # keep models resident between requests
      # Allow the Caddy front (ollama.lab) + direct LAN past Ollama's origin guard.
      OLLAMA_ORIGINS: "http://ollama.lab,https://ollama.lab,http://192.168.10.144:11434"
    ports:
      - "11434:11434"                   # LAN — Heimdall Caddy proxies ollama.lab here
    volumes:
      - /tank/ollama:/root/.ollama       # models on the HDD pool (zfs tank/ollama)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all                 # both RTX 6000 Ada (operator decision)
              capabilities: [gpu]
    logging: { driver: journald }

  # ─── OpenWebUI (chat UI for Ollama) ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    restart: unless-stopped
    depends_on: [ollama]
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"   # same compose network
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET}    # from /opt/Homelab/Thoth/.env (SOPS)
      WEBUI_URL: "http://openwebui.lab"
    ports:
      - "3000:8080"                            # Caddy fronts openwebui.lab here
    volumes:
      - /fast/open-webui:/app/backend/data      # users/chats/settings (SSD)
    logging: { driver: journald }

  # ─── ComfyUI (Stable Diffusion / image gen — GPU) ───────────────────────────
  # ai-dock image: ComfyUI on :8188, persistent /workspace. Models start EMPTY
  # (the old 329 GB ComfyUI pool was wiped) — add checkpoints under
  # /tank/comfyui/ComfyUI/models. No native auth; LAN/Caddy only.
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    restart: unless-stopped
    environment:
      WORKSPACE: "/workspace"
      WEB_ENABLE_AUTH: "false"                 # rely on LAN/Caddy, not ai-dock's portal
      COMFYUI_ARGS: "--listen 0.0.0.0"
    ports:
      - "8188:8188"
    volumes:
      - /tank/comfyui:/workspace                # models + outputs + custom_nodes (HDD pool)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: { driver: journald }

  # ─── Komodo Periphery (manage Thoth's containers from komodo.lab) ───────────
  # v2: Core/Periphery auto-generate keypairs; onboard from the Komodo panel with
  # an onboarding key (see the runbook). Persist /etc/komodo so the keypair +
  # onboarding survive restarts.
  periphery:
    image: ghcr.io/moghtech/komodo-periphery:2.2.0   # MUST match Heimdall's komodo-core version
    restart: unless-stopped
    extra_hosts:
      - "komodo.lab:192.168.10.4"             # so periphery resolves Core (behind Caddy)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /opt/Homelab/Thoth/periphery:/config   # config + persistent keypair (/config/keys)
    ports:
      - "8120:8120"                            # Komodo Core (Heimdall) dials this
    logging: { driver: journald }

  # ─── Tdarr worker/node (hardware transcode — GPU) ───────────────────────────
  # STAGED — enable once the Akasha shared-cache + media NFS exports exist (see
  # docs/design/thoth-plan.md §3b). Connects to the Tdarr SERVER on Hyperion.
  # tdarr-node:
