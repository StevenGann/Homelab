# qBittorrent instance #2 config on Akasha NFS (own path, parallel to instance #1).
# Static PV+PVC follows the akasha-*-nfs convention in media/00-storage/.
# Downloads are SHARED (media-downloads) — only the config dir is per-instance.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: akasha-app-media-qbittorrent3-config
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  capacity: { storage: 1Gi }
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
  claimRef: { namespace: media, name: qbittorrent3-config }
  mountOptions: [nfsvers=4.1, hard, noatime]
  nfs: { server: 192.168.10.247, path: /mnt/Media-Storage/Application-Storage/media/qbittorrent3-config }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent3-config
  namespace: media
  annotations: { kustomize.toolkit.fluxcd.io/prune: disabled }
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: akasha-app-media-qbittorrent3-config
  resources: { requests: { storage: 1Gi } }
