creation_rules:
  - path_regex: k8s/.*secret.*\.yaml
    age: age1u8tfm7scg35csrnam9ntnppne5728593yw7fk3p9sz7ecl06dpgs958ncm

  # NixOS-path secrets are decrypted at activation time on each worker
  # using a per-node age key injected onto its NVMe at install time
  # (/var/lib/sops-nix/key.txt). Per-node pubkeys are appended below by:
  #   ./register-node-key.sh hyperion-<greek>
  # which also runs `sops updatekeys` on any existing nixos/secrets/*.yaml.
  # Hostname → key mapping lives in git history (one commit per
  # registration). (Stale age1qh63… from the retired identity-USB commit
  # removed 2026-05-31.)
  - path_regex: nixos/secrets/.*\.yaml
    age: >-
      age1u8tfm7scg35csrnam9ntnppne5728593yw7fk3p9sz7ecl06dpgs958ncm,
      age1u44vlcj7k3jesa5ns9dqn00yhcqp92gp7rfn7cmmraa3sff2743qfc62qk,
      age1c8pyshr83c0ys4jx6jed0retmzmz4z48y3ew4mzmp6u92t3sxemqv4fzfw,
      age1agqxlqk9rpgua00vzzq8j57jcv00pct0vjt0vjv6vgjevcykzp7qphpyma,
      age15hq6rhul02ludusl9gmafv58pw89y3c6y3jgujl4vrvxtc7tcf9sdjlk97
