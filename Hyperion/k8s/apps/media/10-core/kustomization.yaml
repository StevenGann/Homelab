apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Aggregates the core *arr services. Each child sets `namespace: media` itself.
resources:
  - prowlarr
  - flaresolverr        # Cloudflare-challenge solver; Prowlarr proxies tagged indexers through it
  - sonarr
  - radarr
  - lidarr
  - qbittorrent
