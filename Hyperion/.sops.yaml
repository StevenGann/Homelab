creation_rules:
  # FluxCD-decrypted k8s Secrets (filename `*.sops.yaml` under k8s/). Encrypted
  # to the operator (for editing) + the dedicated in-cluster flux age key, whose
  # PRIVATE half lives only in the flux-system `sops-age` Secret (created
  # out-of-band, never in git). kustomize-controller decrypts these at apply
  # time (the Kustomization needs `decryption: { provider: sops, secretRef:
  # { name: sops-age } }`). Listed first so it wins over the generic rule below.
  - path_regex: k8s/.*\.sops\.ya?ml$
    age: >-
      age1u8tfm7scg35csrnam9ntnppne5728593yw7fk3p9sz7ecl06dpgs958ncm,
      age1wjvfq7kt5z04q3r04k9l2exjxuql0y8n0tq7qxylrjs5vn8ss5pqkv9x59

  - path_regex: k8s/.*secret.*\.yaml
    age: age1u8tfm7scg35csrnam9ntnppne5728593yw7fk3p9sz7ecl06dpgs958ncm

  # NixOS-path secrets are decrypted at activation time on each worker
  # using a per-node age key injected onto its NVMe at install time
  # (/var/lib/sops-nix/key.txt). Per-node pubkeys are appended below by:
  #   ./register-node-key.sh hyperion-<greek>
  # which also runs `sops updatekeys` on any existing nixos/secrets/*.yaml.
  # Hostname → key mapping lives in git history (one commit per
  # registration). (Stale age1qh63… from the retired identity-USB commit
  # removed 2026-05-31.)
  - path_regex: nixos/secrets/.*\.yaml
    age: >-
      age1u8tfm7scg35csrnam9ntnppne5728593yw7fk3p9sz7ecl06dpgs958ncm,
      age1u44vlcj7k3jesa5ns9dqn00yhcqp92gp7rfn7cmmraa3sff2743qfc62qk,
      age1c8pyshr83c0ys4jx6jed0retmzmz4z48y3ew4mzmp6u92t3sxemqv4fzfw,
      age1agqxlqk9rpgua00vzzq8j57jcv00pct0vjt0vjv6vgjevcykzp7qphpyma,
      age15hq6rhul02ludusl9gmafv58pw89y3c6y3jgujl4vrvxtc7tcf9sdjlk97,
      age1a7xx5xgwurdad7xrt3kvk3xkax6sly9037mjr5k5j8n4wmpezq7s7agv5l,
      age1w33g7p5jsx7sjye3akfx6sutjja8z5h2slwpug7mactsaj8an4jsd0sq5r,
      age1z9fhd97xpx8cj5xmznu6vt9nuxcrp08cue926sul5gn3fedcmvlqajh87e,
      age1ln9e92t4cqwscwgt0w5dzctu3w8nm278ayvmnddfd9nvwscx65aq966adn,
      age1z74tm5w08g26sqpnn5xykrdtrylu3kestj0sx754lmffu03jvees8prppm,
      age18qaj57ulvn8vmsayrnxzt2d2mryh6z0yfzreenyu9xpzkhmjjglq9kzhp7
