server {
    listen 50011;
    root /srv/images;
    autoindex on;

    # Efficient large-file delivery
    sendfile    on;
    tcp_nopush  on;

    # Never compress .img.zst — it's already compressed; double-compression
    # increases size and wastes CPU on both ends.
    gzip off;

    location ~* \.img\.zst$ {
        add_header Content-Type application/zstd;
        add_header Content-Disposition inline;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
