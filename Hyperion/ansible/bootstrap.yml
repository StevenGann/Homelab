---
- name: Bootstrap node base configuration
  hosts: k3s_agents
  become: true
  gather_facts: true

  tasks:
    # Hostname is set by apply-identity.service from the identity USB on first boot.
    # cgroup parameters are baked into cmdline.txt by the Node IMG Packer build.
    # Required packages (curl, jq, git, nfs-common, open-iscsi) are pre-installed in the image.
    # Timezone is set to UTC by the Node IMG Packer build.

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Disable password authentication in sshd
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart sshd

    - name: Disable root login via SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart sshd

    # /mnt/node-storage is created by detect-node-storage.service + mnt-node-storage.mount
    # at boot. This task only ensures the mount point exists if the service hasn't run yet.
    - name: Ensure /mnt/node-storage mount point exists
      file:
        path: /mnt/node-storage
        state: directory
        mode: '0755'

  handlers:
    - name: Restart sshd
      service:
        name: ssh
        state: restarted
