apiVersion: apps/v1
kind: Deployment
metadata: { name: nextcloud, namespace: nextcloud, labels: { app: nextcloud } }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: nextcloud } }
  template:
    metadata: { labels: { app: nextcloud } }
    spec:
      nodeSelector: { topology.kubernetes.io/zone: hyperion }
      containers:
        - name: nextcloud
          image: lscr.io/linuxserver/nextcloud:latest
          env:
            - { name: PUID, value: "568" }
            - { name: PGID, value: "568" }
            - { name: TZ, value: "America/Los_Angeles" }
          ports:
            - { name: http, containerPort: 80 }
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: data, mountPath: /data }
          startupProbe:
            tcpSocket: { port: 80 }
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /, port: 80 }
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
      volumes:
        - { name: config, persistentVolumeClaim: { claimName: nextcloud-data } }
        - { name: data, persistentVolumeClaim: { claimName: nextcloud-data } }
