apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent2-port-sync
  namespace: media
data:
  port-sync.sh: |
    #!/bin/sh
    # Keep qBittorrent's listen port in sync with gluetun's NAT-PMP forwarded port.
    # Runs as a linuxserver.io custom service (loops forever).
    #
    # ── DESIGN: NON-DESTRUCTIVE (rewritten 2026-06-15) ─────────────────────────
    # This script ONLY updates the listen port via the WebUI API. It NEVER restarts
    # or pkills qBittorrent.
    #
    # History: the previous version restarted qBittorrent ("pkill -f qbittorrent-nox")
    # to force a clean libtorrent session bound to tun0. That restart loop was the
    # root cause of RECURRING outages: qBittorrent's boot is slow and passes through
    # transient API states (HTTP 000 while starting, occasional 403), and any of
    # those made the script kill qBittorrent mid-boot → the k8s readiness probe
    # (tcp :8085) never passed → pod stuck 1/2 forever, re-killing on every cycle.
    #
    # The tun0 bind is now handled deterministically OUTSIDE this script:
    #   * Session\Interface*=tun0 / InterfaceAddress are persisted in the config PVC.
    #   * The s6 run script (qbittorrent2-s6-run) WAITS for tun0 before launching
    #     qBittorrent, so libtorrent binds the tunnel on its first session.
    # So no restart is ever needed here, and a transient can no longer take the
    # app down. Worst case if the forwarded port can't be applied: inbound peers
    # are limited until the next cycle — DHT/egress still work via the tunnel bind.

    PORT_FILE="/tmp/gluetun/forwarded_port"
    QBIT_API="http://127.0.0.1:8085/api/v2"  # localhost: auth bypassed (WebUI\LocalHostAuth=false)
    # No credentials: qBittorrent bypasses WebUI auth for localhost (set in the s6
    # run script). linuxserver custom services don't get the container env, so
    # depending on a password here previously sent empty creds → 127.0.0.1 got
    # auth-banned → 403 for everyone. Localhost-bypass removes that failure mode.
    MAX_WAIT=120                            # seconds to wait for the initial port file
    POLL_INTERVAL=5
    WEBUI_WAIT=150                          # ×2s = ~5 min for a slow first boot
    SYNC_INTERVAL=30                        # steady-state re-check cadence

    log() { echo "[port-sync] $(date '+%H:%M:%S') $*"; }

    cur_port() { cat "$PORT_FILE" 2>/dev/null | tr -d '[:space:]'; }
    valid_port() { [ -n "$1" ] && [ "$1" -gt 0 ] 2>/dev/null; }

    # Reachable + serving (HTTP 200) over localhost. curl exits 0 on any HTTP
    # response, so check the code so a transient during early boot isn't "ready".
    webui_ready() {
      _c=$(curl -s -o /dev/null -w '%{http_code}' "${QBIT_API}/app/version" 2>/dev/null)
      [ "$_c" = "200" ]
    }

    # Non-destructive: set only the listen port. No interface/session changes, no
    # restart. qBittorrent applies a listen-port change live.
    apply_port() {
      _code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "${QBIT_API}/app/setPreferences" \
        --data-urlencode "json={\"listen_port\":${1}}" 2>/dev/null)
      [ "$_code" = "200" ]
    }

    # ── wait for gluetun to publish the forwarded port ─────────────────────────
    waited=0
    while [ ! -f "$PORT_FILE" ] && [ $waited -lt $MAX_WAIT ]; do
      sleep $POLL_INTERVAL; waited=$((waited + POLL_INTERVAL))
    done
    [ -f "$PORT_FILE" ] || { log "no $PORT_FILE after ${MAX_WAIT}s — exiting (s6 will retry)"; exit 1; }

    # ── wait for the WebUI to be up + authenticated (never kill it) ─────────────
    _w=0
    until webui_ready; do
      _w=$((_w + 1))
      [ $_w -ge $WEBUI_WAIT ] && { log "WebUI not ready after ~5min; continuing best-effort"; break; }
      sleep 2
    done
    log "WebUI ready"

    # ── fix AuthSubnetWhitelist via API (QSettings adds spaces on save, which
    #    may break subnet parsing — the API sets the correct format in-memory)
    _code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "${QBIT_API}/app/setPreferences" \
      --data-urlencode 'json={"bypass_auth_subnet_whitelist":"127.0.0.1,10.42.0.0/16,10.43.0.0/16,192.168.10.0/24","bypass_auth_subnet_whitelist_enabled":true}' 2>/dev/null)
    if [ "$_code" = "200" ]; then log "AuthSubnetWhitelist set via API"
    else log "AuthSubnetWhitelist API returned $_code (non-fatal)"; fi

    # ── sync loop: apply on first pass + whenever the forwarded port changes ────
    LAST=""
    while true; do
      PORT=$(cur_port)
      if valid_port "$PORT" && [ "$PORT" != "$LAST" ]; then
        if apply_port "$PORT"; then log "listen_port set to $PORT"; LAST="$PORT"
        else log "failed to set listen_port=$PORT (will retry next cycle)"; fi
      fi
      sleep $SYNC_INTERVAL
    done
