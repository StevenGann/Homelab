apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: nextcloud
  labels: { app: mariadb }
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels: { app: mariadb }
  template:
    metadata:
      labels: { app: mariadb }
    spec:
      nodeSelector: { topology.kubernetes.io/zone: hyperion }
      containers:
        - name: mariadb
          image: mariadb:11.4
          envFrom:
            - secretRef: { name: mariadb }
          ports:
            - { name: mysql, containerPort: 3306 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/mysql }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          startupProbe:
            tcpSocket: { port: 3306 }
            failureThreshold: 30
            periodSeconds: 3
          readinessProbe:
            tcpSocket: { port: 3306 }
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: "10Gi" } }
